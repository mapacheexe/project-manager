<div class="task-modal__overlay">
  <div class="task-modal__box">
    <h2 class="task-modal__title">{{ task() ? 'Editar tarea' : 'Nueva tarea' }}</h2>

    <form [formGroup]="form" (ngSubmit)="onSave()" class="task-modal__form">
      <div class="form-group">
        <label for="title">Título</label>
        <input id="title" type="text" formControlName="title" class="form-control" />
      </div>

      <div class="form-group">
        <label for="description">Descripción</label>
        <textarea id="description" formControlName="description" class="form-control" rows="3"></textarea>
      </div>

      <div class="form-group">
        <label for="status">Estado</label>
        <select id="status" formControlName="status" class="form-control">
          <option value="">Sin estado</option>
          @for (s of statusOptions; track s) {
          <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>

      <div class="task-modal__actions">
        <button type="submit" class="btn" [disabled]="form.invalid">Guardar</button>
        <button type="button" class="btn btn--ghost" (click)="onCancel()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
