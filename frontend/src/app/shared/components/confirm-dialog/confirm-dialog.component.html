<div class="confirm-dialog__overlay">
  <div class="confirm-dialog__box">
    <p class="confirm-dialog__message">{{ message() }}</p>
    <div class="confirm-dialog__actions">
      <button class="btn" type="button" (click)="onConfirm()">Confirmar</button>
      <button class="btn btn--ghost" type="button" (click)="onCancel()">Cancelar</button>
    </div>
  </div>
</div>
