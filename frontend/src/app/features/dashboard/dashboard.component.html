<div class="dashboard">
  <div class="dashboard__header">
    <h2 class="dashboard__title">Mis proyectos</h2>
    @if (!showForm()) {
      <button class="btn" type="button" (click)="showForm.set(true)">+ Nuevo proyecto</button>
    }
  </div>

  @if (showForm()) {
    <div class="dashboard__new-project">
      <input
        class="form-field__input"
        type="text"
        placeholder="Nombre del proyecto"
        [value]="newProjectName()"
        (input)="newProjectName.set($any($event.target).value)"
      />
      <button class="btn" type="button" (click)="createProject()">Crear</button>
      <button class="btn btn--ghost" type="button" (click)="showForm.set(false)">Cancelar</button>
    </div>
  }

  <div class="project-grid">
    @for (project of projects(); track project.id) {
      <app-project-card [project]="project" (selected)="openProject($event)" />
    } @empty {
      <p class="dashboard__empty">No hay proyectos todavía.</p>
    }
  </div>
</div>
