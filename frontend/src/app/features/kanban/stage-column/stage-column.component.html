<div class="stage-column">
  <div class="stage-column__header">
    <h3 class="stage-column__title">{{ stage().name }}</h3>
    <button class="btn btn--ghost btn--sm" type="button" (click)="stageDeleted.emit(stage().id)">✕</button>
  </div>

  <div class="stage-column__tasks">
    @for (task of stage().tasks; track task.id) {
      <app-task-card
        [task]="task"
        [stages]="stages()"
        (taskMoved)="taskMoved.emit($event)"
      />
    } @empty {
      <p class="stage-column__empty">Sin tareas.</p>
    }
  </div>

  @if (showTaskForm()) {
    <div class="stage-column__task-form">
      <input
        class="form-field__input"
        type="text"
        placeholder="Título de la tarea"
        [value]="newTaskTitle()"
        (input)="newTaskTitle.set($any($event.target).value)"
      />
      <div class="stage-column__task-form-actions">
        <button class="btn btn--sm" type="button" (click)="submitTask()">Añadir</button>
        <button class="btn btn--ghost btn--sm" type="button" (click)="showTaskForm.set(false)">Cancelar</button>
      </div>
    </div>
  } @else {
    <button class="btn btn--ghost btn--sm stage-column__add-task" type="button" (click)="showTaskForm.set(true)">
      + Añadir tarea
    </button>
  }
</div>
