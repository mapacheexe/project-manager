<div class="kanban-board">
  <div class="kanban-board__header">
    <a class="kanban-board__back" routerLink="/dashboard">← Mis proyectos</a>
    <h2 class="kanban-board__title">{{ project()?.name }}</h2>
  </div>
  <div class="kanban-board__columns">
    @for (stage of stages(); track stage.id) {
      <app-stage-column
        [stage]="stage"
        (taskCreated)="onTaskCreated($event.stageId, $event.title)"
        (stageDeleted)="onStageDeleted($event)"
        [stages]="stages()"
        (taskMoved)="onTaskMoved($event)"
        (taskEditRequested)="onTaskEditingRequested($event)"
        (taskDeleteRequested)="onTaskDeleteRequested($event)"
      />
    } @empty {
      <p class="kanban-board__empty">No hay etapas. Añade una para empezar.</p>
    }

    @if (showStageForm()) {
      <div class="kanban-board__stage-form">
        <input
          class="form-field__input"
          type="text"
          placeholder="Nombre de la etapa"
          [value]="newStageName()"
          (input)="newStageName.set($any($event.target).value)"
        />
        <button class="btn" type="button" (click)="createStage()">Crear</button>
        <button class="btn btn--ghost" type="button" (click)="showStageForm.set(false)">Cancelar</button>
      </div>
    } @else {
      <button class="btn btn--ghost kanban-board__add-stage" type="button" (click)="showStageForm.set(true)">
        + Añadir etapa
      </button>
    }
    @if (editingTask() != null) {
      <app-task-modal
        [task]="editingTask()"
        (saved)="onTaskSaved($event)"
        (cancelled)="editingTask.set(null)"
      />
    }
    @if (deletingTask() !== null) {
      <app-confirm-dialog
        message="¿Eliminar la tarea '{{ deletingTask()!.title }}'?"
        (confirmed)="onTaskDeleteConfirmed()"
        (cancelled)="deletingTask.set(null)"
      />
    }
  </div>
</div>
