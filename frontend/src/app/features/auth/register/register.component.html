<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title">Crear cuenta</h1>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-field">
        <label class="form-field__label" for="name">Nombre</label>
        <input
          class="form-field__input"
          id="name"
          type="text"
          formControlName="name"
          autocomplete="name"
          placeholder="Tu nombre"
        />
      </div>

      <div class="form-field">
        <label class="form-field__label" for="email">Email</label>
        <input
          class="form-field__input"
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tu@email.com"
        />
      </div>

      <div class="form-field">
        <label class="form-field__label" for="password">Contraseña</label>
        <input
          class="form-field__input"
          id="password"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="••••••••"
        />
      </div>

      <button class="btn btn--full" type="submit" [disabled]="form.invalid">Registrarse</button>
    </form>

    <p class="auth-card__footer">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
