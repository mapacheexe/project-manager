<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-card__title">Iniciar sesión</h1>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-field">
        <label class="form-field__label" for="email">Email</label>
        <input
          class="form-field__input"
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="tu@email.com"
        />
      </div>

      <div class="form-field">
        <label class="form-field__label" for="password">Contraseña</label>
        <input
          class="form-field__input"
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      @if (loginError()) {
        <p class="auth-form__error">Email no encontrado. Verifica tus datos o regístrate.</p>
      }

      <button class="btn btn--full" type="submit" [disabled]="form.invalid">Entrar</button>
    </form>

    <p class="auth-card__footer">
      ¿No tienes cuenta? <a routerLink="/register">Regístrate</a>
    </p>
  </div>
</div>
